name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -ErrorAction Stop

      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          $issues = Invoke-ScriptAnalyzer -Path . -Recurse -Settings @{
            ExcludeRules = @('PSAvoidUsingWriteHost')
          }
          $issues | Format-Table -AutoSize
          $errors = $issues | Where-Object { $_.Severity -eq 'Error' }
          if ($errors) {
            Write-Error "$($errors.Count) error(s) found."
            exit 1
          }
          $warnings = $issues | Where-Object { $_.Severity -eq 'Warning' }
          Write-Host "$($warnings.Count) warning(s), 0 errors."

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputFormat = 'NUnit2.5'
          $config.TestResult.OutputPath = 'TestResults.xml'
          Invoke-Pester -Configuration $config

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xml
